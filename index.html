<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Feeder 1.29</title>  
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #121212;       
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .card { 
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 12px; 
            width: 380px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
        }

        .stat-grid { display: flex; justify-content: space-around; margin-bottom: 20px; background: rgba(37, 37, 37, 0.6); padding: 15px; border-radius: 8px; align-items: center; }
        .big-number { font-size: 2.2em; font-weight: bold; color: #00e5ff; line-height: 1; }
        .label { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .slash { font-size: 1.2em; color: #777; margin-left: 2px; }
        
        .adj-btn { background: #444; color: white; border: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 1em; margin: 0 5px; transition: 0.2s; }
        .adj-btn:hover { background: #555; color: #00e5ff; }

        #timer { font-size: 2.2em; margin: 10px 0; color: #ffb300; font-family: monospace; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .timer-ctrl { margin-bottom: 20px; }
        .timer-adj { background: #333; color: #ccc; border: 1px solid #444; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.75em; margin: 0 5px; }
        .timer-adj:hover { background: #444; color: white; }

        .main-btn { background: #00e5ff; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; color: #000; font-size: 1.1em; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
        .main-btn:hover { background: #00fff2; transform: translateY(-1px); }
        .main-btn:active { transform: translateY(1px); }
        .main-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .secondary-btns { display: flex; gap: 10px; margin-top: 15px; }
        .cancel-btn { background: #444; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 0.8em; display: none; transition: 0.2s; }
        .cancel-btn:hover { background: #555; }
        .reset-btn { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 0.8em; transition: 0.2s; }
        .reset-btn:hover { background: rgba(255, 68, 68, 0.1); }

        .history { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; font-size: 0.8em; border-top: 1px solid #333; padding-top: 15px; color: #ccc; }
        .history div { padding: 4px 0; border-bottom: 1px solid #252525; }
        .history::-webkit-scrollbar { width: 6px; }
        .history::-webkit-scrollbar-track { background: #1e1e1e; }
        .history::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

<div class="card">
    <div class="stat-grid">
        <div>
            <div class="label">Stat</div>
            <button class="adj-btn" onclick="adjustStat(-1)">-</button>
            <span id="stat" class="big-number">0</span>
            <button class="adj-btn" onclick="adjustStat(1)">+</button>
        </div>
        <div>
            <div class="label">Repas</div>
            <button class="adj-btn" onclick="adjustMeals(-1)">-</button>
            <span id="repas" class="big-number">0</span><span class="slash">/3</span>
            <button class="adj-btn" onclick="adjustMeals(1)">+</button>
        </div>
    </div>

    <div id="timer">--:--:--</div>
    <div class="timer-ctrl">
        <button class="timer-adj" onclick="adjustTimer(-600000)">- 10m</button>
        <button class="timer-adj" onclick="adjustTimer(600000)">+ 10m</button>
    </div>

    <button id="feedBtn" class="main-btn" onclick="feed()" disabled>Initialisation...</button>

    <div class="secondary-btns">
        <button id="cancelBtn" class="cancel-btn" onclick="cancelLast()">↩ Annuler</button>
        <button class="reset-btn" onclick="reset()">Reset</button>
    </div>

    <div class="history" id="history"><strong>Historique :</strong></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('familierData')) || { 
        stat: 0, meals: 0, nextFeedTime: 0, history: [] 
    };
    let backup = JSON.parse(localStorage.getItem('familierBackup')) || null;

    const feedBtn = document.getElementById('feedBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const timerDisplay = document.getElementById('timer');

    function save() {
        localStorage.setItem('familierData', JSON.stringify(data));
        if (backup) {
            localStorage.setItem('familierBackup', JSON.stringify(backup));
            cancelBtn.style.display = 'block';
        } else {
            localStorage.removeItem('familierBackup');
            cancelBtn.style.display = 'none';
        }
    }

    function updateUI() {
        document.getElementById('stat').innerText = data.stat;
        document.getElementById('repas').innerText = data.meals;
        const historyDiv = document.getElementById('history');
        historyDiv.innerHTML = '<strong>Historique :</strong>' + 
            (data.history.length > 0 ? data.history.map(h => `<div>${h}</div>`).join('') : '<div>Aucun repas.</div>');
    }

    function feed() {
        const now = Date.now();
        if (data.nextFeedTime > now) return;
        backup = JSON.parse(JSON.stringify(data));
        data.meals++;
        let timestamp = new Date().toLocaleTimeString('fr-FR');
        if (data.meals >= 3) {
            data.stat++;
            data.meals = 0;
            data.nextFeedTime = 0;
            data.history.unshift(`⭐ +1 Stat (${data.stat}) - ${timestamp}`);
        } else {
            data.nextFeedTime = now + (5 * 60 * 60 * 1000);
            data.history.unshift(`🍖 Repas ${data.meals}/3 - ${timestamp}`);
        }
        save(); updateUI(); checkTimer();
    }

    function adjustStat(val) {
        backup = JSON.parse(JSON.stringify(data));
        data.stat = Math.max(0, data.stat + val);
        save(); updateUI();
    }

    function adjustMeals(val) {
        backup = JSON.parse(JSON.stringify(data));
        data.meals = (data.meals + val);
        if (data.meals < 0) data.meals = 0;
        if (data.meals > 2) data.meals = 2; 
        save(); updateUI();
    }

    function adjustTimer(ms) {
        const now = Date.now();
        if (data.nextFeedTime <= now) data.nextFeedTime = now + ms;
        else data.nextFeedTime += ms;
        if (data.nextFeedTime < now) data.nextFeedTime = 0;
        save(); checkTimer();
    }

    function cancelLast() {
        if (!backup) return;
        data = JSON.parse(JSON.stringify(backup));
        backup = null;
        save(); updateUI(); checkTimer();
    }

    function checkTimer() {
        const now = Date.now();
        if (data.nextFeedTime > now) {
            feedBtn.disabled = true;
            feedBtn.innerText = "En attente...";
            const diff = data.nextFeedTime - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            timerDisplay.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        } else {
            feedBtn.disabled = false;
            feedBtn.innerText = "Nourrir";
            timerDisplay.innerText = "Prêt !";
        }
    }

    function reset() {
        if(confirm("Tout effacer ?")) {
            data = { stat: 0, meals: 0, nextFeedTime: 0, history: [] };
            backup = null; save(); updateUI(); checkTimer();
        }
    }

    updateUI(); checkTimer();
    if (backup) cancelBtn.style.display = 'block';
    setInterval(checkTimer, 1000);
</script>

</body>
</html>
